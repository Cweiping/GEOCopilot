<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GEOCopilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="title">GEOCopilot</div>
      <div class="quick-actions">
        <button id="quickExportBtn" class="icon-btn quick-action" type="button" aria-label="导出配置" data-tooltip="导出配置">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 20h14v-2H5v2Zm7-18v10.17l3.59-3.58L17 10l-5 5-5-5 1.41-1.41L11 12.17V2h1Z"/>
          </svg>
        </button>
        <button id="quickImportBtn" class="icon-btn quick-action" type="button" aria-label="导入配置" data-tooltip="导入配置">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 20h14v-2H5v2Zm7-3V6.83l3.59 3.58L17 9l-5-5-5 5 1.41 1.41L11 6.83V17h1Z"/>
          </svg>
        </button>
      </div>
    </div>
    <input id="quickImportInput" type="file" accept="application/json" hidden>
    <div id="subtitle" class="subtitle"></div>

    <div class="tabs">
      <button id="tabSitesBtn" class="tab active" data-tab="sites"></button>
      <button id="tabSmartBtn" class="tab" data-tab="smart"></button>
      <button id="tabManualBtn" class="tab" data-tab="manual"></button>
      <button id="tabSettingsBtn" class="tab" data-tab="settings"></button>
    </div>

    <section id="tab-sites" class="panel active">
      <div id="siteList" class="site-list"></div>

      <button id="addSiteToggle" class="section-toggle" data-target="addSiteSection"></button>
      <div id="addSiteSection" class="section-content">
        <div class="form-grid">
          <div class="inline-two">
            <div>
              <label id="siteNameLabel" for="siteName"></label>
              <input id="siteName" required>
            </div>
            <div>
              <label id="siteCategoryLabel" for="siteCategory"></label>
              <input id="siteCategory">
            </div>
          </div>

          <label id="siteUrlLabel" for="siteUrl"></label>
          <input id="siteUrl" required>

          <label id="siteEmailLabel" for="siteEmail"></label>
          <input id="siteEmail">

          <label id="siteShortDescLabel" for="siteShortDesc"></label>
          <textarea id="siteShortDesc"></textarea>

          <label id="siteLongDescLabel" for="siteLongDesc"></label>
          <textarea id="siteLongDesc"></textarea>

          <label id="siteTagsLabel" for="siteTagInput"></label>
          <div>
            <input id="siteTagInput">
            <div id="siteTags" class="tags"></div>
          </div>
        </div>
        <button id="addSiteBtn"></button>
      </div>
    </section>

    <section id="tab-smart" class="panel">
      <p id="matchStatus"></p>
      <button id="smartFillBtn"></button>
      <div class="strategy-panel">
        <div class="strategy-head">
          <strong id="strategyTitle"></strong>
          <button id="addStrategyBtn" class="secondary" type="button"></button>
        </div>
        <div id="strategyList" class="strategy-list"></div>
        <button id="saveStrategiesBtn" type="button"></button>
      </div>
    </section>

    <section id="tab-manual" class="panel">
      <div class="row">
        <label id="fieldSelectLabel" for="fieldSelect"></label>
        <select id="fieldSelect"></select>
      </div>
      <div class="row">
        <label id="valueSelectLabel" for="valueSelect"></label>
        <select id="valueSelect"></select>
      </div>
      <button id="manualFillBtn"></button>
      <button id="refreshFieldsBtn" class="secondary"></button>
    </section>

    <section id="tab-settings" class="panel">
      <label class="checkbox">
        <input type="checkbox" id="autoFillOnLoad">
        <span id="autoFillOnLoadLabel"></span>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="preferSidePanel" checked disabled>
        <span id="preferSidePanelLabel"></span>
      </label>
      <div class="row">
        <label id="languageLabel" for="languageSelect"></label>
        <select id="languageSelect">
          <option value="auto"></option>
          <option value="zh-CN"></option>
          <option value="en"></option>
        </select>
      </div>
      <div class="row">
        <label id="themeLabel" for="themeSelect"></label>
        <select id="themeSelect">
          <option value="auto"></option>
          <option value="light"></option>
          <option value="dark"></option>
        </select>
      </div>
      <p id="sidePanelHint" class="hint"></p>
    </section>

    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
