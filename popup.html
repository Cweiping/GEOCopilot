<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GEOCopilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="title">GEOCopilot</div>
      <div class="quick-actions">
        <a id="sponsorLink" class="icon-btn quick-action sponsor-action" href="https://github.com/sponsors/Cweiping" target="_blank" rel="noopener noreferrer" aria-label="Sponsor" data-tooltip="Sponsor">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M11.645 20.91a.75.75 0 0 0 .71 0C14.6 19.67 21 15.43 21 9.75A5.25 5.25 0 0 0 15.75 4.5c-1.74 0-3.29.84-4.25 2.14A5.25 5.25 0 0 0 7.25 4.5 5.25 5.25 0 0 0 2 9.75c0 5.68 6.4 9.92 9.645 11.16Z"/>
          </svg>
        </a>
        <button id="quickExportBtn" class="icon-btn quick-action" type="button" aria-label="Export config" data-tooltip="Export config">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 20h14v-2H5v2Zm7-18v10.17l3.59-3.58L17 10l-5 5-5-5 1.41-1.41L11 12.17V2h1Z"/>
          </svg>
        </button>
        <button id="quickImportBtn" class="icon-btn quick-action" type="button" aria-label="Import config" data-tooltip="Import config">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 20h14v-2H5v2Zm7-3V6.83l3.59 3.58L17 9l-5-5-5 5 1.41 1.41L11 6.83V17h1Z"/>
          </svg>
        </button>
      </div>
    </div>
    <input id="quickImportInput" type="file" accept="application/json" hidden>
    <div id="subtitle" class="subtitle"></div>

    <div class="tabs">
      <button id="tabSitesBtn" class="tab active" data-tab="sites"></button>
      <button id="tabSmartBtn" class="tab" data-tab="smart"></button>
      <button id="tabManualBtn" class="tab" data-tab="manual"></button>
      <button id="tabSettingsBtn" class="tab" data-tab="settings"></button>
    </div>

    <section id="tab-sites" class="panel active">
      <div id="siteList" class="site-list"></div>

      <button id="addSiteToggle" class="section-toggle" data-target="addSiteSection"></button>
      <div id="addSiteSection" class="section-content">
        <div class="form-grid">
          <div class="inline-two">
            <div>
              <label id="siteNameLabel" for="siteName"></label>
              <input id="siteName" required>
            </div>
            <div>
              <label id="siteCategoryLabel" for="siteCategory"></label>
              <input id="siteCategory">
            </div>
          </div>

          <label id="siteUrlLabel" for="siteUrl"></label>
          <input id="siteUrl" required>

          <label id="siteEmailLabel" for="siteEmail"></label>
          <input id="siteEmail">

          <label id="siteShortDescLabel" for="siteShortDesc"></label>
          <textarea id="siteShortDesc"></textarea>

          <label id="siteLongDescLabel" for="siteLongDesc"></label>
          <textarea id="siteLongDesc"></textarea>

          <label id="siteTagsLabel" for="siteTagInput"></label>
          <div>
            <input id="siteTagInput">
            <div id="siteTags" class="tags"></div>
          </div>
        </div>
        <button id="addSiteBtn"></button>
      </div>
    </section>

    <section id="tab-smart" class="panel">
      <p id="matchStatus"></p>
      <button id="smartFillBtn"></button>
      <div class="strategy-panel">
        <div class="strategy-head">
          <strong id="strategyTitle"></strong>
          <button id="addStrategyBtn" class="secondary" type="button"></button>
        </div>
        <div id="strategyList" class="strategy-list"></div>
        <button id="saveStrategiesBtn" type="button"></button>
      </div>
    </section>

    <section id="tab-manual" class="panel">
      <div class="row">
        <label id="fieldSelectLabel" for="fieldSelect"></label>
        <select id="fieldSelect"></select>
      </div>
      <div class="row">
        <label id="valueSelectLabel" for="valueSelect"></label>
        <select id="valueSelect"></select>
      </div>
      <button id="manualFillBtn"></button>
      <button id="refreshFieldsBtn" class="secondary"></button>
    </section>

    <section id="tab-settings" class="panel">
      <label class="checkbox">
        <input type="checkbox" id="enableWebFill" checked>
        <span id="enableWebFillLabel"></span>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="enableAllFeatures" checked>
        <span id="enableAllFeaturesLabel"></span>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="autoFillOnLoad">
        <span id="autoFillOnLoadLabel"></span>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="preferSidePanel" checked disabled>
        <span id="preferSidePanelLabel"></span>
      </label>
      <div class="row">
        <label id="languageLabel" for="languageSelect"></label>
        <select id="languageSelect">
          <option value="auto"></option>
          <option value="zh-CN"></option>
          <option value="en"></option>
        </select>
      </div>
      <div class="row">
        <label id="themeLabel" for="themeSelect"></label>
        <select id="themeSelect">
          <option value="auto"></option>
          <option value="light"></option>
          <option value="dark"></option>
        </select>
      </div>
    </section>

    <div class="quick-rail" aria-label="Quick actions">
      <button id="railSidePanelToggleBtn" class="quick-rail-btn" type="button" title="">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v12h5V6H4Zm7 0v12h9V6h-9Z"/>
        </svg>
      </button>
      <button id="railSmartFillBtn" class="quick-rail-btn rail-primary-btn" type="button" title="">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Zm0 4.44 1.2 3.6 3.6 1.2-3.6 1.2-1.2 3.6-1.2-3.6-3.6-1.2 3.6-1.2L12 6.44Z"/>
        </svg>
      </button>
      <button id="railSettingsBtn" class="quick-rail-btn" type="button" title="">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.18 7.18 0 0 0-1.63-.94L14.4 2.7a.5.5 0 0 0-.5-.4h-3.8a.5.5 0 0 0-.5.4L9.25 5.32c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.5.39 1.05.71 1.63.94l.35 2.62c.04.24.25.4.5.4h3.8c.25 0 .46-.16.5-.4l.35-2.62c.58-.23 1.12-.54 1.63-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
        </svg>
      </button>
      <a id="railFeedbackLink" class="quick-rail-btn rail-link-btn" href="https://github.com/Cweiping/GEOCopilot/issues" target="_blank" rel="noopener noreferrer" title="">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2Zm0 2v10.17L7.17 13H20V6H4Z"/>
        </svg>
      </a>
    </div>

    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
